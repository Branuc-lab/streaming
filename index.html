<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STREAMDEOUF - Films & Séries en VF</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: #0a0a0a;
    color: #e5e5e5;
    font-family: 'Inter', sans-serif;
    overflow-x: hidden;
  }

  /* === LOADER === */
  #loader {
    position:fixed; inset:0; z-index:99999;
    background:#0a0a0a;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    transition: opacity 0.5s;
  }
  #loader.hidden { opacity:0; pointer-events:none; }
  .loader-logo {
    font-size:42px; font-weight:900; color:#e50914;
    letter-spacing:3px; margin-bottom:20px;
    text-shadow: 0 0 30px rgba(229,9,20,0.5);
  }
  .loader-bar {
    width:200px; height:3px; background:#222; border-radius:2px; overflow:hidden;
  }
  .loader-bar-inner {
    width:40%; height:100%; background:#e50914; border-radius:2px;
    animation: loading 1s ease infinite;
  }
  @keyframes loading {
    0% { transform:translateX(-100%); }
    100% { transform:translateX(350%); }
  }

  /* === HEADER === */
  header {
    position:fixed; top:0; left:0; right:0; z-index:1000;
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 40px;
    background:linear-gradient(180deg, rgba(0,0,0,0.95) 0%, transparent 100%);
    transition: background 0.3s;
  }
  header.scrolled { background:rgba(10,10,10,0.98); }

  .logo {
    font-size:26px; font-weight:900; letter-spacing:2px;
    color:#e50914; text-transform:uppercase;
    text-shadow:0 0 20px rgba(229,9,20,0.4);
  }

  nav { display:flex; gap:20px; align-items:center; }
  nav a {
    color:#b3b3b3; text-decoration:none; font-size:14px; font-weight:600;
    transition:color 0.2s; cursor:pointer;
  }
  nav a:hover, nav a.active { color:#fff; }

  .header-right { display:flex; align-items:center; gap:16px; }

  .search-box {
    display:flex; align-items:center; background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15); border-radius:4px;
    padding:6px 12px; gap:8px;
  }
  .search-box input {
    background:transparent; border:none; outline:none; color:#fff;
    font-size:14px; width:200px;
  }
  .search-box input::placeholder { color:#666; }

  .server-select {
    background:#1a1a1a; color:#fff; border:1px solid #333;
    padding:6px 10px; border-radius:4px; font-size:13px;
    cursor:pointer; outline:none;
  }

  /* === HERO === */
  .hero {
    position:relative; width:100%; height:85vh; overflow:hidden;
    display:flex; align-items:flex-end; padding:0 40px 80px;
  }
  .hero-bg {
    position:absolute; inset:0;
    background-size:cover; background-position:center top;
    filter:brightness(0.4);
    transition:background-image 0.8s ease;
  }
  .hero-gradient {
    position:absolute; inset:0;
    background:linear-gradient(0deg, #0a0a0a 0%, transparent 50%),
               linear-gradient(90deg, rgba(10,10,10,0.9) 0%, transparent 60%);
  }
  .hero-content { position:relative; z-index:2; max-width:600px; }
  .hero-content h1 {
    font-size:48px; font-weight:900; line-height:1.1;
    margin-bottom:16px; text-shadow:0 2px 20px rgba(0,0,0,0.8);
  }
  .hero-content p {
    font-size:15px; line-height:1.6; color:#ccc;
    margin-bottom:24px; display:-webkit-box;
    -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden;
  }
  .hero-meta { display:flex; gap:12px; align-items:center; margin-bottom:16px; }
  .hero-rating {
    background:#e50914; color:#fff; padding:3px 8px;
    border-radius:3px; font-size:13px; font-weight:700;
  }
  .hero-year { color:#999; font-size:14px; }
  .hero-type {
    color:#000; background:#ffd700; padding:2px 8px;
    border-radius:3px; font-size:12px; font-weight:700;
  }
  .hero-buttons { display:flex; gap:12px; }
  .btn-play, .btn-info {
    padding:12px 28px; border:none; border-radius:4px;
    font-size:15px; font-weight:700; cursor:pointer;
    display:flex; align-items:center; gap:8px; transition:all 0.2s;
  }
  .btn-play { background:#fff; color:#000; }
  .btn-play:hover { background:#e5e5e5; }
  .btn-info { background:rgba(109,109,110,0.7); color:#fff; }
  .btn-info:hover { background:rgba(109,109,110,0.5); }

  /* === CONTENT === */
  .content { padding:20px 40px 60px; margin-top:-40px; position:relative; z-index:5; }
  .row { margin-bottom:40px; }
  .row-title {
    font-size:20px; font-weight:700; margin-bottom:14px;
    color:#fff; padding-left:2px;
  }
  .row-container {
    display:flex; gap:10px; overflow-x:auto; padding-bottom:10px;
    scrollbar-width:none;
  }
  .row-container::-webkit-scrollbar { display:none; }

  .card {
    flex:0 0 180px; cursor:pointer; position:relative;
    border-radius:6px; overflow:hidden; transition:transform 0.25s, box-shadow 0.25s;
  }
  .card:hover {
    transform:scale(1.08); z-index:10;
    box-shadow:0 8px 30px rgba(0,0,0,0.7);
  }
  .card img { width:100%; height:270px; object-fit:cover; display:block; }
  .card-overlay {
    position:absolute; bottom:0; left:0; right:0;
    background:linear-gradient(transparent, rgba(0,0,0,0.95));
    padding:30px 10px 10px; opacity:0; transition:opacity 0.25s;
  }
  .card:hover .card-overlay { opacity:1; }
  .card-title { font-size:12px; font-weight:700; line-height:1.3; }
  .card-rating { font-size:11px; color:#46d369; margin-top:3px; }
  .card-lang {
    position:absolute; top:8px; left:8px;
    background:rgba(229,9,20,0.9); color:#fff;
    font-size:10px; font-weight:700; padding:2px 6px;
    border-radius:3px;
  }

  /* === MODAL === */
  .modal-overlay {
    display:none; position:fixed; inset:0; z-index:9999;
    background:rgba(0,0,0,0.95); align-items:center; justify-content:center;
  }
  .modal-overlay.active { display:flex; }
  .modal-box {
    width:92vw; max-width:1100px; background:#141414;
    border-radius:8px; overflow:hidden; position:relative;
    max-height:95vh; overflow-y:auto;
  }
  .modal-close {
    position:absolute; top:12px; right:16px; z-index:10;
    background:rgba(0,0,0,0.6); border:none; color:#fff;
    width:36px; height:36px; border-radius:50%; font-size:20px;
    cursor:pointer; display:flex; align-items:center; justify-content:center;
  }
  .modal-close:hover { background:rgba(255,255,255,0.2); }
  .modal-player { width:100%; aspect-ratio:16/9; background:#000; }
  .modal-player iframe { width:100%; height:100%; border:none; }
  .modal-info { padding:24px; }
  .modal-info h2 { font-size:26px; font-weight:700; margin-bottom:8px; }
  .modal-info .meta { color:#999; font-size:14px; margin-bottom:16px; display:flex; gap:16px; flex-wrap:wrap; }
  .modal-info .meta .score { color:#46d369; font-weight:700; }
  .modal-info p { font-size:14px; line-height:1.7; color:#bbb; margin-bottom:20px; }

  .modal-servers { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
  .modal-servers button {
    padding:8px 16px; border:1px solid #333; border-radius:4px;
    background:#1a1a1a; color:#ccc; cursor:pointer;
    font-size:13px; font-weight:600; transition:all 0.2s;
  }
  .modal-servers button:hover, .modal-servers button.active {
    background:#e50914; border-color:#e50914; color:#fff;
  }

  .modal-seasons { margin-top:16px; }
  .modal-seasons select {
    background:#1a1a1a; color:#fff; border:1px solid #333;
    padding:8px 12px; border-radius:4px; font-size:14px;
    cursor:pointer; margin-right:10px;
  }

  .episodes-grid {
    display:grid; grid-template-columns:repeat(auto-fill, minmax(200px,1fr));
    gap:10px; margin-top:12px;
  }
  .ep-card {
    background:#1a1a1a; border-radius:6px; padding:12px;
    cursor:pointer; transition:background 0.2s; border:1px solid transparent;
  }
  .ep-card:hover { background:#2a2a2a; border-color:#e50914; }
  .ep-card .ep-num { color:#e50914; font-weight:700; font-size:13px; }
  .ep-card .ep-name { font-size:12px; color:#ccc; margin-top:4px; }

  /* === RESPONSIVE === */
  @media(max-width:768px) {
    header { padding:10px 16px; flex-wrap:wrap; gap:8px; }
    .logo { font-size:20px; }
    nav { gap:12px; }
    nav a { font-size:12px; }
    .search-box input { width:100px; }
    .hero { height:55vh; padding:0 16px 40px; }
    .hero-content h1 { font-size:26px; }
    .content { padding:10px 16px 40px; }
    .card { flex:0 0 130px; }
    .card img { height:195px; }
    .row-title { font-size:16px; }
    .header-right { gap:8px; }
  }
</style>
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <div class="loader-logo">STREAMDEOUF</div>
  <div class="loader-bar"><div class="loader-bar-inner"></div></div>
</div>

<!-- HEADER -->
<header id="header">
  <div class="logo">STREAMDEOUF</div>
  <nav>
    <a class="active" data-tab="all">Accueil</a>
    <a data-tab="movie">Films</a>
    <a data-tab="tv">Séries</a>
  </nav>
  <div class="header-right">
    <select class="server-select" id="globalServer">
      <option value="vidsrc.icu">Serveur 1</option>
      <option value="vidsrc.cc">Serveur 2</option>
      <option value="vidsrc.xyz">Serveur 3</option>
      <option value="multiembed.mov">Serveur 4</option>
      <option value="embed.su">Serveur 5</option>
    </select>
    <div class="search-box">
      <span>🔍</span>
      <input type="text" id="searchInput" placeholder="Rechercher...">
    </div>
  </div>
</header>

<!-- HERO -->
<section class="hero" id="hero">
  <div class="hero-bg" id="heroBg"></div>
  <div class="hero-gradient"></div>
  <div class="hero-content" id="heroContent"></div>
</section>

<!-- CONTENT -->
<div class="content" id="content"></div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <button class="modal-close" id="modalClose">✕</button>
    <div class="modal-player" id="modalPlayer"></div>
    <div class="modal-info" id="modalInfo"></div>
  </div>
</div>

<script>
const API_KEY = '77f0d9098f28cd262109739d1c578945';
const BASE = 'https://api.themoviedb.org/3';
const IMG = 'https://image.tmdb.org/t/p/';
const LANG = 'fr-FR';

let currentTab = 'all';
let searchTimeout;
let currentType = '';
let currentId = 0;

// === SERVERS ===
const SERVERS = {
  'vidsrc.icu': (type, id, s, e) => type === 'tv' ? `https://vidsrc.icu/embed/tv/${id}/${s}/${e}` : `https://vidsrc.icu/embed/movie/${id}`,
  'vidsrc.cc': (type, id, s, e) => type === 'tv' ? `https://vidsrc.cc/v2/embed/tv/${id}/${s}/${e}` : `https://vidsrc.cc/v2/embed/movie/${id}`,
  'vidsrc.xyz': (type, id, s, e) => type === 'tv' ? `https://vidsrc.xyz/embed/tv/${id}/${s}/${e}` : `https://vidsrc.xyz/embed/movie/${id}`,
  'multiembed.mov': (type, id, s, e) => type === 'tv' ? `https://multiembed.mov/?video_id=${id}&tmdb=1&s=${s}&e=${e}` : `https://multiembed.mov/?video_id=${id}&tmdb=1`,
  'embed.su': (type, id, s, e) => type === 'tv' ? `https://embed.su/embed/tv/${id}/${s}/${e}` : `https://embed.su/embed/movie/${id}`
};

function getServer() {
  return document.getElementById('globalServer').value;
}

function getPlayerUrl(type, id, season, episode) {
  const srv = SERVERS[getServer()];
  return srv(type, id, season || 1, episode || 1);
}

// === API ===
async function tmdb(endpoint) {
  try {
    const sep = endpoint.includes('?') ? '&' : '?';
    const r = await fetch(`${BASE}${endpoint}${sep}api_key=${API_KEY}&language=${LANG}`);
    return await r.json();
  } catch(e) {
    console.error('TMDB Error:', e);
    return { results: [] };
  }
}

// === SAFE STRING ===
function safe(str) {
  if (!str) return '';
  return str.replace(/'/g, "\\'").replace(/"/g, '&quot;').replace(/\n/g, ' ');
}

// === LOADER ===
function hideLoader() {
  const l = document.getElementById('loader');
  l.classList.add('hidden');
  setTimeout(() => l.style.display = 'none', 600);
}

// === HERO ===
async function loadHero() {
  const data = await tmdb('/trending/all/week');
  const items = (data.results || []).filter(i => i.backdrop_path && i.overview);
  if (!items.length) return;
  const pick = items[Math.floor(Math.random() * Math.min(8, items.length))];

  document.getElementById('heroBg').style.backgroundImage = `url(${IMG}original${pick.backdrop_path})`;

  const title = pick.title || pick.name;
  const year = (pick.release_date || pick.first_air_date || '').slice(0, 4);
  const rating = pick.vote_average ? pick.vote_average.toFixed(1) : '?';
  const type = pick.media_type === 'tv' ? 'tv' : 'movie';
  const typeLabel = type === 'tv' ? 'SÉRIE' : 'FILM';

  document.getElementById('heroContent').innerHTML = `
    <div class="hero-meta">
      <span class="hero-rating">★ ${rating}</span>
      <span class="hero-year">${year}</span>
      <span class="hero-type">${typeLabel}</span>
    </div>
    <h1>${title}</h1>
    <p>${pick.overview}</p>
    <div class="hero-buttons">
      <button class="btn-play" onclick="openPlayer('${type}',${pick.id})">▶ Lecture</button>
      <button class="btn-info" onclick="openPlayer('${type}',${pick.id})">ℹ Plus d'infos</button>
    </div>
  `;
}

// === ROWS ===
async function loadContent(tab) {
  const el = document.getElementById('content');
  el.innerHTML = '<div style="display:flex;justify-content:center;padding:80px 0;"><div class="loader-bar" style="width:150px;"><div class="loader-bar-inner"></div></div></div>';

  let rows = [];
  if (tab === 'all') {
    rows = [
      { title: '🔥 Tendances', endpoint: '/trending/all/week' },
      { title: '🎬 Films populaires', endpoint: '/movie/popular' },
      { title: '📺 Séries populaires', endpoint: '/tv/popular' },
      { title: '🏆 Films les mieux notés', endpoint: '/movie/top_rated' },
      { title: '⭐ Séries les mieux notées', endpoint: '/tv/top_rated' },
      { title: '🎭 Au cinéma', endpoint: '/movie/now_playing' },
      { title: '📡 Séries en cours', endpoint: '/tv/on_the_air' },
      { title: '💥 Action', endpoint: '/discover/movie?with_genres=28&sort_by=popularity.desc' },
      { title: '😂 Comédie', endpoint: '/discover/movie?with_genres=35&sort_by=popularity.desc' },
      { title: '💀 Horreur', endpoint: '/discover/movie?with_genres=27&sort_by=popularity.desc' },
      { title: '🧪 Science-Fiction', endpoint: '/discover/movie?with_genres=878&sort_by=popularity.desc' },
      { title: '🔎 Thriller', endpoint: '/discover/movie?with_genres=53&sort_by=popularity.desc' },
      { title: '💕 Romance', endpoint: '/discover/movie?with_genres=10749&sort_by=popularity.desc' },
      { title: '🎨 Animation', endpoint: '/discover/movie?with_genres=16&sort_by=popularity.desc' },
      { title: '📖 Drame', endpoint: '/discover/movie?with_genres=18&sort_by=popularity.desc' },
      { title: '🌍 Documentaire', endpoint: '/discover/movie?with_genres=99&sort_by=popularity.desc' },
    ];
  } else if (tab === 'movie') {
    rows = [
      { title: '🎬 Populaires', endpoint: '/movie/popular' },
      { title: '🏆 Mieux notés', endpoint: '/movie/top_rated' },
      { title: '🎭 Au cinéma', endpoint: '/movie/now_playing' },
      { title: '📅 Prochainement', endpoint: '/movie/upcoming' },
      { title: '💥 Action', endpoint: '/discover/movie?with_genres=28&sort_by=popularity.desc' },
      { title: '😂 Comédie', endpoint: '/discover/movie?with_genres=35&sort_by=popularity.desc' },
      { title: '💀 Horreur', endpoint: '/discover/movie?with_genres=27&sort_by=popularity.desc' },
      { title: '🧪 Sci-Fi', endpoint: '/discover/movie?with_genres=878&sort_by=popularity.desc' },
      { title: '💕 Romance', endpoint: '/discover/movie?with_genres=10749&sort_by=popularity.desc' },
      { title: '🎨 Animation', endpoint: '/discover/movie?with_genres=16&sort_by=popularity.desc' },
      { title: '📖 Drame', endpoint: '/discover/movie?with_genres=18&sort_by=popularity.desc' },
      { title: '🔎 Thriller', endpoint: '/discover/movie?with_genres=53&sort_by=popularity.desc' },
      { title: '🌍 Documentaire', endpoint: '/discover/movie?with_genres=99&sort_by=popularity.desc' },
      { title: '🎵 Musical', endpoint: '/discover/movie?with_genres=10402&sort_by=popularity.desc' },
      { title: '⚔️ Guerre', endpoint: '/discover/movie?with_genres=10752&sort_by=popularity.desc' },
    ];
  } else {
    rows = [
      { title: '📺 Populaires', endpoint: '/tv/popular' },
      { title: '⭐ Mieux notées', endpoint: '/tv/top_rated' },
      { title: '📡 En diffusion', endpoint: '/tv/on_the_air' },
      { title: '🆕 Aujourd\'hui', endpoint: '/tv/airing_today' },
      { title: '💥 Action & Aventure', endpoint: '/discover/tv?with_genres=10759&sort_by=popularity.desc' },
      { title: '😂 Comédie', endpoint: '/discover/tv?with_genres=35&sort_by=popularity.desc' },
      { title: '📖 Drame', endpoint: '/discover/tv?with_genres=18&sort_by=popularity.desc' },
      { title: '🔎 Mystère', endpoint: '/discover/tv?with_genres=9648&sort_by=popularity.desc' },
      { title: '🧪 Sci-Fi & Fantasy', endpoint: '/discover/tv?with_genres=10765&sort_by=popularity.desc' },
      { title: '🎨 Animation', endpoint: '/discover/tv?with_genres=16&sort_by=popularity.desc' },
      { title: '🌍 Documentaire', endpoint: '/discover/tv?with_genres=99&sort_by=popularity.desc' },
    ];
  }

  const allData = await Promise.all(rows.map(r => tmdb(r.endpoint)));
  let html = '';

  allData.forEach((data, i) => {
    const items = (data.results || []).filter(item => item.poster_path);
    if (!items.length) return;
    html += `<div class="row"><div class="row-title">${rows[i].title}</div><div class="row-container">`;
    items.forEach(item => {
      const title = item.title || item.name;
      const type = item.media_type || (tab === 'tv' ? 'tv' : (tab === 'movie' ? 'movie' : (item.first_air_date ? 'tv' : 'movie')));
      const year = (item.release_date || item.first_air_date || '').slice(0, 4);
      const rating = item.vote_average ? item.vote_average.toFixed(1) : '?';
      const lang = (item.original_language === 'fr') ? 'VF' : '';
      html += `
        <div class="card" onclick="openPlayer('${type}',${item.id})">
          ${lang ? `<div class="card-lang">${lang}</div>` : ''}
          <img src="${IMG}w300${item.poster_path}" alt="${safe(title)}" loading="lazy">
          <div class="card-overlay">
            <div class="card-title">${title}</div>
            <div class="card-rating">★ ${rating} · ${year}</div>
          </div>
        </div>`;
    });
    html += '</div></div>';
  });

  el.innerHTML = html || '<p style="text-align:center;padding:60px;color:#666;">Aucun résultat.</p>';
}

// === SEARCH ===
async function doSearch(query) {
  if (!query.trim()) { loadContent(currentTab); return; }
  const el = document.getElementById('content');
  el.innerHTML = '<div style="display:flex;justify-content:center;padding:80px 0;"><div class="loader-bar" style="width:150px;"><div class="loader-bar-inner"></div></div></div>';
  const data = await tmdb(`/search/multi?query=${encodeURIComponent(query)}`);
  const items = (data.results || []).filter(i => i.poster_path && (i.media_type === 'movie' || i.media_type === 'tv'));

  let html = `<div class="row"><div class="row-title">Résultats pour "${query}"</div><div class="row-container" style="flex-wrap:wrap;">`;
  items.forEach(item => {
    const title = item.title || item.name;
    const type = item.media_type;
    const year = (item.release_date || item.first_air_date || '').slice(0, 4);
    const rating = item.vote_average ? item.vote_average.
