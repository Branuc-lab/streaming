<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STREAMDEOUF</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0a;
            color: #fff;
            font-family: 'Segoe UI', Arial, Helvetica, sans-serif;
            overflow-x: hidden;
        }

        /* ── SCROLLBAR ── */
        ::-webkit-scrollbar { height: 6px; width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e50914; border-radius: 3px; }

        /* ── HEADER ── */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 500;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 48px;
            height: 68px;
            background: linear-gradient(180deg, rgba(0,0,0,.95) 0%, transparent 100%);
            transition: background .3s;
        }

        header.scrolled {
            background: rgba(0, 0, 0, .97);
            box-shadow: 0 2px 20px rgba(0,0,0,.6);
        }

        .logo {
            font-size: 2rem;
            font-weight: 900;
            color: #e50914;
            letter-spacing: 2px;
            user-select: none;
        }

        nav { display: flex; gap: 28px; }

        nav a {
            color: #ccc;
            text-decoration: none;
            font-size: .95rem;
            font-weight: 500;
            transition: color .2s;
        }

        nav a:hover, nav a.active { color: #fff; }

        /* ── HERO ── */
        .hero {
            position: relative;
            height: 100vh;
            min-height: 600px;
            display: flex;
            align-items: center;
            padding: 0 48px;
            background-color: #0a0a0a;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                linear-gradient(to right, rgba(0,0,0,.92) 0%, rgba(0,0,0,.45) 50%, rgba(0,0,0,.1) 100%),
                linear-gradient(to top, #0a0a0a 0%, transparent 40%);
            z-index: 1;
        }

        .hero-content { max-width: 620px; z-index: 2; }

        .hero-tag {
            display: inline-block;
            background: #e50914;
            color: #fff;
            font-size: .75rem;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 3px;
            margin-bottom: 16px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .hero h1 {
            font-size: 4rem;
            font-weight: 900;
            line-height: 1.05;
            margin-bottom: 18px;
            text-shadow: 0 4px 30px rgba(0,0,0,.7);
        }

        .hero p {
            font-size: 1.15rem;
            color: #ccc;
            line-height: 1.6;
            margin-bottom: 32px;
            max-width: 500px;
        }

        .hero-buttons { display: flex; gap: 14px; flex-wrap: wrap; }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 32px;
            font-size: 1.05rem;
            font-weight: 700;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all .2s;
        }

        .btn-primary {
            background: #e50914;
            color: #fff;
        }

        .btn-primary:hover {
            background: #ff0a16;
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(229,9,20,.5);
        }

        .btn-secondary {
            background: rgba(255,255,255,.15);
            color: #fff;
            backdrop-filter: blur(4px);
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,.3);
        }

        /* ── SECTIONS ── */
        .section {
            padding: 28px 48px;
            position: relative;
        }

        .section h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 16px;
            position: relative;
            display: inline-block;
        }

        .section h2::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 40px;
            height: 3px;
            background: #e50914;
            border-radius: 2px;
        }

        /* ── ROW ── */
        .row {
            display: flex;
            gap: 14px;
            overflow-x: auto;
            padding: 16px 0 24px;
            scroll-behavior: smooth;
            -ms-overflow-style: none;
            scrollbar-width: thin;
        }

        /* ── CARDS ── */
        .card {
            position: relative;
            min-width: 220px;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform .3s cubic-bezier(.25,.8,.25,1), box-shadow .3s;
            flex-shrink: 0;
        }

        .card:hover {
            transform: scale(1.15);
            z-index: 10;
            box-shadow: 0 14px 40px rgba(0,0,0,.7), 0 0 20px rgba(229,9,20,.2);
        }

        .card img {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
            display: block;
        }

        .card-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,.85) 0%, transparent 60%);
            opacity: 0;
            transition: opacity .3s;
            display: flex;
            align-items: flex-end;
            padding: 14px;
        }

        .card:hover .card-overlay { opacity: 1; }

        .card-title {
            font-size: .9rem;
            font-weight: 600;
            line-height: 1.3;
        }

        .card-meta {
            font-size: .75rem;
            color: #e50914;
            margin-top: 4px;
            font-weight: 600;
        }

        /* ── PLAYER MODAL ── */
        .player-modal {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(0, 0, 0, .92);
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
        }

        .player-modal.open { display: flex; }

        .player-container {
            position: relative;
            width: 95vw;
            height: 95vh;
            border-radius: 10px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 0 60px rgba(0,0,0,.8);
        }

        .player-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .player-close {
            position: absolute;
            top: 16px;
            right: 20px;
            z-index: 1001;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,.3);
            background: rgba(0, 0, 0, .7);
            color: #fff;
            font-size: 1.4rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all .2s;
            backdrop-filter: blur(4px);
        }

        .player-close:hover {
            background: #e50914;
            border-color: #e50914;
            transform: rotate(90deg) scale(1.1);
        }

        /* ── FOOTER ── */
        footer {
            padding: 60px 48px 30px;
            text-align: center;
            color: #444;
            font-size: .85rem;
            border-top: 1px solid #1a1a1a;
            margin-top: 40px;
        }

        /* ── LOADING SCREEN ── */
        #loadingScreen {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity .5s;
        }
        #loadingScreen.hidden {
            opacity: 0;
            pointer-events: none;
        }
        #loadingScreen .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #333;
            border-top-color: #e50914;
            border-radius: 50%;
            animation: spin .8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── RESPONSIVE ── */
        @media (max-width: 1024px) {
            .hero h1 { font-size: 3rem; }
            .section { padding: 24px 32px; }
            header { padding: 0 32px; }
            .hero { padding: 0 32px; }
        }

        @media (max-width: 768px) {
            header { padding: 0 20px; height: 56px; }
            .logo { font-size: 1.5rem; }
            nav { gap: 16px; }
            nav a { font-size: .85rem; }

            .hero { padding: 0 20px; min-height: 500px; }
            .hero h1 { font-size: 2.2rem; }
            .hero p { font-size: 1rem; }
            .btn { padding: 12px 24px; font-size: .95rem; }

            .section { padding: 20px; }
            .section h2 { font-size: 1.25rem; }
            .card { min-width: 160px; }

            .player-container { width: 100vw; height: 100vh; border-radius: 0; }
        }

        @media (max-width: 480px) {
            .hero h1 { font-size: 1.8rem; }
            .hero p { font-size: .9rem; margin-bottom: 24px; }
            .hero-buttons { flex-direction: column; }
            .btn { width: 100%; justify-content: center; }
            nav a { font-size: .8rem; }
            .card { min-width: 140px; }
        }
    </style>
</head>
<body>

    <!-- LOADING SCREEN -->
    <div id="loadingScreen"><div class="spinner"></div></div>

    <!-- HEADER -->
    <header id="header">
        <div class="logo">STREAMDEOUF</div>
        <nav>
            <a href="#" class="active">Accueil</a>
            <a href="#films">Films</a>
            <a href="#series">Séries</a>
        </nav>
    </header>

    <!-- HERO -->
    <div class="hero" id="hero">
        <div class="hero-content">
            <span class="hero-tag" id="heroTag">Tendance</span>
            <h1 id="heroTitle">Chargement...</h1>
            <p id="heroDesc"></p>
            <div class="hero-buttons">
                <button class="btn btn-primary" id="heroPlayBtn">▶ Lecture</button>
                <button class="btn btn-secondary" id="heroInfoBtn">ℹ Plus d'infos</button>
            </div>
        </div>
    </div>

    <!-- TENDANCES -->
    <div class="section">
        <h2>🔥 Tendances</h2>
        <div class="row" id="rowTrending"></div>
    </div>

    <!-- FILMS POPULAIRES -->
    <div class="section" id="films">
        <h2>🎬 Films populaires</h2>
        <div class="row" id="rowMovies"></div>
    </div>

    <!-- SÉRIES -->
    <div class="section" id="series">
        <h2>📺 Séries</h2>
        <div class="row" id="rowSeries"></div>
    </div>

    <!-- FOOTER -->
    <footer>
        STREAMDEOUF &copy; 2026 &mdash; Propulsé par TMDB.
    </footer>

    <!-- PLAYER MODAL -->
    <div class="player-modal" id="playerModal">
        <div class="player-container">
            <button class="player-close" onclick="closePlayer()">&times;</button>
            <iframe id="playerFrame" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        const TMDB_KEY = '77f0d9098f28cd262109739d1c578945';
        const IMG_BASE = 'https://image.tmdb.org/t/p/';
        const LANG = 'fr-FR';

        // ── Loading screen ──
        function hideLoader() {
            setTimeout(() => {
                document.getElementById('loadingScreen').classList.add('hidden');
            }, 1500);
        }
        document.addEventListener('DOMContentLoaded', hideLoader);

        // ── Header scroll ──
        window.addEventListener('scroll', () => {
            document.getElementById('header').classList.toggle('scrolled', window.scrollY > 50);
        });

        // ── TMDB fetch helper ──
        async function tmdbFetch(endpoint) {
            const res = await fetch(
                `https://api.themoviedb.org/3${endpoint}${endpoint.includes('?') ? '&' : '?'}api_key=${TMDB_KEY}&language=${LANG}`
            );
            return res.json();
        }

        // ── Build a card ──
        function createCard(item, type) {
            const title = item.title || item.name;
            const poster = item.poster_path
                ? `${IMG_BASE}w342${item.poster_path}`
                : 'https://via.placeholder.com/342x513/1a1a1a/333?text=No+Image';
            const rating = item.vote_average ? item.vote_average.toFixed(1) : '—';
            const mediaType = type || item.media_type || 'movie';
            const tmdbId = item.id;

            const card = document.createElement('div');
            card.className = 'card';
            card.onclick = () => openTrailer(tmdbId, mediaType);
            card.innerHTML = `
                <img src="${poster}" alt="${title}" loading="lazy">
                <div class="card-overlay">
                    <div>
                        <div class="card-title">${title}</div>
                        <div class="card-meta">⭐ ${rating}</div>
                    </div>
                </div>
            `;
            return card;
        }

        // ── Set hero from a movie/show ──
        function setHero(item, type) {
            const hero = document.getElementById('hero');
            const backdrop = item.backdrop_path
                ? `${IMG_BASE}original${item.backdrop_path}`
                : '';
            if (backdrop) {
                hero.style.backgroundImage = `url('${backdrop}')`;
            }
            document.getElementById('heroTitle').textContent = item.title || item.name;
            document.getElementById('heroDesc').textContent = item.overview
                ? (item.overview.length > 200 ? item.overview.slice(0, 200) + '…' : item.overview)
                : '';
            const mediaType = type || item.media_type || 'movie';
            document.getElementById('heroPlayBtn').onclick = () => openTrailer(item.id, mediaType);
        }

        // ── Open trailer from TMDB videos ──
        async function openTrailer(tmdbId, mediaType) {
            try {
                const data = await tmdbFetch(`/${mediaType}/${tmdbId}/videos`);
                const trailer = data.results && data.results.find(
                    v => v.site === 'YouTube' && (v.type === 'Trailer' || v.type === 'Teaser')
                );
                if (trailer) {
                    openPlayer(`https://www.youtube.com/embed/${trailer.key}?autoplay=1`);
                } else {
                    alert('Aucune bande-annonce disponible.');
                }
            } catch {
                alert('Erreur lors du chargement de la bande-annonce.');
            }
        }

        // ── Player ──
        function openPlayer(url) {
            if (!url) { alert('Aucune URL configurée pour ce contenu.'); return; }
            document.getElementById('playerFrame').src = url;
            document.getElementById('playerModal').classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closePlayer() {
            document.getElementById('playerModal').classList.remove('open');
            document.getElementById('playerFrame').src = '';
            document.body.style.overflow = '';
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closePlayer();
        });

        document.getElementById('playerModal').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) closePlayer();
        });

        // ── Load all data ──
        async function init() {
            try {
                const [trending, movies, series] = await Promise.all([
                    tmdbFetch('/trending/all/week'),
                    tmdbFetch('/movie/popular'),
                    tmdbFetch('/tv/popular')
                ]);

                // Hero = first trending item
                if (trending.results && trending.results.length > 0) {
                    setHero(trending.results[0]);
                }

                // Populate rows
                const rowTrending = document.getElementById('rowTrending');
                const rowMovies = document.getElementById('rowMovies');
                const rowSeries = document.getElementById('rowSeries');

                (trending.results || []).slice(0, 10).forEach(item => {
                    rowTrending.appendChild(createCard(item));
                });

                (movies.results || []).slice(0, 10).forEach(item => {
                    rowMovies.appendChild(createCard(item, 'movie'));
                });

                (series.results || []).slice(0, 10).forEach(item => {
                    rowSeries.appendChild(createCard(item, 'tv'));
                });

            } catch (err) {
                console.error('Erreur TMDB:', err);
            }
        }

        init();
    </script>
</body>
</html>
