<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STREAMDEOUF</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#fff;font-family:Arial,sans-serif}
header{background:#111;padding:20px 40px;display:flex;justify-content:space-between;align-items:center}
header h1{color:#e50914;font-size:28px;letter-spacing:2px}
nav a{color:#aaa;text-decoration:none;margin-left:20px;font-size:14px}
nav a:hover{color:#fff}
.search{margin:30px 40px}
.search input{width:100%;max-width:500px;padding:12px 20px;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:#fff;font-size:16px}
.section{padding:20px 40px}
.section h2{margin-bottom:15px;font-size:20px;color:#ccc}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:15px}
.card{background:#1a1a1a;border-radius:8px;overflow:hidden;cursor:pointer;transition:transform .2s}
.card:hover{transform:scale(1.05)}
.card img{width:100%;height:260px;object-fit:cover}
.card .info{padding:10px}
.card .info p{font-size:13px;color:#aaa}
.card .info h3{font-size:14px;margin-top:4px}
#player{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.95);z-index:999;justify-content:center;align-items:center}
#player iframe{width:90%;height:80%;border:none;border-radius:8px}
#player .close{position:absolute;top:20px;right:30px;color:#fff;font-size:30px;cursor:pointer}
</style>
</head>
<body>
<header>
<h1>STREAMDEOUF</h1>
<nav><a href="#">Films</a><a href="#">Séries</a></nav>
</header>
<div class="search"><input type="text" id="searchInput" placeholder="Rechercher un film ou une série..." oninput="filterCards()"></div>

<div class="section">
<h2>🔥 Tendances</h2>
<div class="grid" id="grid"></div>
</div>

<div id="player"><span class="close" onclick="closePlayer()">✕</span><iframe id="frame" allowfullscreen></iframe></div>

<script>
const films=[
{title:"Oppenheimer",year:2023,img:"https://image.tmdb.org/t/p/w300/8Gxv8gSFCU0XGDykEGv7zR1n2ua.jpg",id:"872585"},
{title:"Dune 2",year:2024,img:"https://image.tmdb.org/t/p/w300/8b8R8l88Qje9dn9OE8PY05Nez7S.jpg",id:"693134"},
{title:"Deadpool & Wolverine",year:2024,img:"https://image.tmdb.org/t/p/w300/8cdWjvZQUExUUTzyp4t6EDMubfO.jpg",id:"533535"},
{title:"Interstellar",year:2014,img:"https://image.tmdb.org/t/p/w300/gEU2QniE6E77NI6lCU6MxlNBvIx.jpg",id:"157336"},
{title:"The Batman",year:2022,img:"https://image.tmdb.org/t/p/w300/74xTEgt7R36Fpooo50r9T25onhq.jpg",id:"414906"},
{title:"John Wick 4",year:2023,img:"https://image.tmdb.org/t/p/w300/vZloFAK7NmvMGKE7LsyZiRVNSWd.jpg",id:"603692"}
];

const grid=document.getElementById("grid");

function render(list){
grid.innerHTML="";
list.forEach(f=>{
grid.innerHTML+=`<div class="card" onclick="playFilm('${f.id}')"><img src="${f.img}" alt="${f.title}"><div class="info"><p>${f.year}</p><h3>${f.title}</h3></div></div>`;
});
}
render(films);

function filterCards(){
const q=document.getElementById("searchInput").value.toLowerCase();
render(films.filter(f=>f.title.toLowerCase().includes(q)));
}

function playFilm(id){
document.getElementById("player").style.display="flex";
document.getElementById("frame").src="https://vidsrc.to/embed/movie/"+id;
}
function closePlayer(){
document.getElementById("player").style.display="none";
document.getElementById("frame").src="";
}
</script>
</body>
</html>
