<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STREAMDEOUF - Streaming Gratuit</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --red: #e50914;
  --red-dark: #b20710;
  --bg-primary: #000000;
  --bg-secondary: #0a0a0a;
  --bg-card: #141414;
  --bg-hover: #1a1a1a;
  --text-primary: #ffffff;
  --text-secondary: #b3b3b3;
  --text-muted: #666666;
  --gradient-hero: linear-gradient(to right, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.7) 40%, rgba(0,0,0,0.1) 100%);
  --gradient-bottom: linear-gradient(to top, #000 0%, transparent 100%);
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  overflow-x: hidden;
  scrollbar-width: thin;
  scrollbar-color: #333 #000;
}

body::-webkit-scrollbar { width: 8px; }
body::-webkit-scrollbar-track { background: #000; }
body::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

.header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 4%;
  height: 68px;
  background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, transparent 100%);
  transition: background 0.4s ease;
}

.header.scrolled {
  background: rgba(0,0,0,0.95);
  backdrop-filter: blur(10px);
  box-shadow: 0 2px 20px rgba(0,0,0,0.5);
}

.header-left {
  display: flex;
  align-items: center;
  gap: 40px;
}

.logo {
  font-size: 28px;
  font-weight: 900;
  color: var(--red);
  letter-spacing: -1px;
  cursor: pointer;
  text-shadow: 0 0 20px rgba(229,9,20,0.3);
}

.nav-links {
  display: flex;
  gap: 24px;
  list-style: none;
}

.nav-links li a {
  color: var(--text-secondary);
  text-decoration: none;
  font-size: 14px;
  font-weight: 400;
  transition: color 0.2s;
  cursor: pointer;
}

.nav-links li a:hover,
.nav-links li a.active {
  color: var(--text-primary);
}

.header-right {
  display: flex;
  align-items: center;
  gap: 20px;
}

.search-container {
  position: relative;
  display: flex;
  align-items: center;
}

.search-toggle {
  background: none;
  border: none;
  color: #fff;
  font-size: 20px;
  cursor: pointer;
  padding: 4px;
}

.search-input {
  width: 0;
  padding: 8px 0;
  border: none;
  background: transparent;
  color: #fff;
  font-size: 14px;
  font-family: 'Inter', sans-serif;
  transition: width 0.3s ease, padding 0.3s ease, border 0.3s ease;
  outline: none;
}

.search-container.open .search-input {
  width: 250px;
  padding: 8px 12px;
  border: 1px solid rgba(255,255,255,0.3);
  background: rgba(0,0,0,0.8);
}

.profile-icon {
  width: 32px;
  height: 32px;
  border-radius: 4px;
  background: linear-gradient(135deg, var(--red), #ff6b00);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 14px;
  cursor: pointer;
}

.hero {
  position: relative;
  width: 100%;
  height: 90vh;
  min-height: 600px;
  display: flex;
  align-items: center;
  overflow: hidden;
}

.hero-bg {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center 20%;
  transition: opacity 1.2s ease, background-image 1.2s ease;
}

.hero-overlay {
  position: absolute;
  inset: 0;
  background: var(--gradient-hero);
}

.hero-bottom {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 200px;
  background: var(--gradient-bottom);
}

.hero-content {
  position: relative;
  z-index: 2;
  padding: 0 4%;
  max-width: 650px;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(229,9,20,0.15);
  border: 1px solid rgba(229,9,20,0.3);
  padding: 6px 14px;
  border-radius: 4px;
  font-size: 12px;
  font-weight: 600;
  color: var(--red);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 16px;
}

.hero-title {
  font-size: clamp(36px, 5vw, 64px);
  font-weight: 900;
  line-height: 1.05;
  margin-bottom: 16px;
  text-shadow: 0 4px 30px rgba(0,0,0,0.6);
}

.hero-meta {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 16px;
  font-size: 14px;
  color: var(--text-secondary);
}

.hero-meta .rating {
  color: #46d369;
  font-weight: 700;
}

.hero-meta .maturity {
  border: 1px solid rgba(255,255,255,0.3);
  padding: 1px 6px;
  font-size: 12px;
}

.hero-desc {
  font-size: 16px;
  line-height: 1.6;
  color: var(--text-secondary);
  margin-bottom: 28px;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.hero-buttons {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 12px 28px;
  border: none;
  border-radius: 4px;
  font-size: 16px;
  font-weight: 600;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  transition: all 0.2s ease;
}

.btn-play { background: #fff; color: #000; }
.btn-play:hover { background: #e0e0e0; }
.btn-info { background: rgba(255,255,255,0.15); color: #fff; backdrop-filter: blur(4px); }
.btn-info:hover { background: rgba(255,255,255,0.25); }
.btn-mylist { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); }
.btn-mylist:hover { background: rgba(255,255,255,0.2); }
.btn-mylist.added { background: rgba(229,9,20,0.2); border-color: var(--red); color: var(--red); }

.content-section {
  position: relative;
  z-index: 3;
  margin-top: -80px;
  padding-bottom: 60px;
}

.row {
  margin-bottom: 40px;
  padding: 0 4%;
}

.row-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}

.row-title {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.3px;
}

.row-see-all {
  font-size: 13px;
  color: var(--text-muted);
  cursor: pointer;
  transition: color 0.2s;
}

.row-see-all:hover { color: var(--text-primary); }

.row-container {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  scroll-behavior: smooth;
  padding-bottom: 10px;
  scrollbar-width: none;
}

.row-container::-webkit-scrollbar { display: none; }

.card {
  flex: 0 0 auto;
  width: 200px;
  cursor: pointer;
  transition: transform 0.3s ease, z-index 0s 0.3s;
  position: relative;
}

.card:hover {
  transform: scale(1.15);
  z-index: 10;
  transition: transform 0.3s ease, z-index 0s;
}

.card-img-wrapper {
  position: relative;
  width: 100%;
  aspect-ratio: 2/3;
  border-radius: 6px;
  overflow: hidden;
  background: var(--bg-card);
}

.card-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: filter 0.3s;
}

.card:hover .card-img { filter: brightness(0.5); }

.card-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 12px;
  opacity: 0;
  transition: opacity 0.3s;
  background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 60%);
}

.card:hover .card-overlay { opacity: 1; }

.card-overlay-title { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
.card-overlay-meta { font-size: 11px; color: var(--text-secondary); display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
.card-overlay-meta .g { color: #46d369; font-weight: 600; }

.card-play-btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: rgba(255,255,255,0.95);
  border: none;
  color: #000;
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.15s;
}

.card-play-btn:hover { transform: scale(1.1); }

.card-number {
  position: absolute;
  left: -8px;
  bottom: 0;
  font-size: 120px;
  font-weight: 900;
  line-height: 0.8;
  color: transparent;
  -webkit-text-stroke: 3px #333;
  pointer-events: none;
}

.card-title {
  margin-top: 8px;
  font-size: 13px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.row-top10 .card { width: 160px; }
.row-top10 .card-img-wrapper { margin-left: 40px; }

.mylist-empty {
  text-align: center;
  padding: 40px;
  color: var(--text-muted);
  font-size: 14px;
  border: 1px dashed #333;
  border-radius: 8px;
  margin: 0 4%;
}

.search-results {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 900;
  background: rgba(0,0,0,0.97);
  padding: 100px 4% 40px;
  overflow-y: auto;
}

.search-results.active { display: block; }

.search-results-title { font-size: 24px; font-weight: 700; margin-bottom: 24px; }

.search-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 16px;
}

.search-grid .card { width: 100%; }

.player-modal {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 2000;
  background: rgba(0,0,0,0.95);
  justify-content: center;
  align-items: center;
}

.player-modal.active { display: flex; }

.player-wrapper {
  position: relative;
  width: 95vw;
  height: 90vh;
  max-width: 1600px;
  background: #000;
  border-radius: 8px;
  overflow: hidden;
  box-shadow: 0 0 80px rgba(0,0,0,0.8);
}

.player-iframe { width: 100%; height: 100%; border: none; }

.player-close {
  position: absolute;
  top: 16px;
  right: 16px;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: rgba(0,0,0,0.7);
  border: 1px solid rgba(255,255,255,0.2);
  color: #fff;
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
  transition: background 0.2s;
}

.player-close:hover { background: rgba(229,9,20,0.7); }

.player-sources {
  position: absolute;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 8px;
  z-index: 10;
  background: rgba(0,0,0,0.8);
  padding: 8px 12px;
  border-radius: 8px;
  backdrop-filter: blur(10px);
}

.source-btn {
  padding: 6px 16px;
  border: 1px solid rgba(255,255,255,0.2);
  background: transparent;
  color: #fff;
  font-size: 12px;
  font-family: 'Inter', sans-serif;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.2s;
}

.source-btn:hover, .source-btn.active { background: var(--red); border-color: var(--red); }

.genre-bar {
  padding: 20px 4% 10px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.genre-chip {
  padding: 6px 16px;
  border-radius: 20px;
  border: 1px solid #333;
  background: transparent;
  color: var(--text-secondary);
  font-size: 13px;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  transition: all 0.2s;
}

.genre-chip:hover, .genre-chip.active { background: var(--red); border-color: var(--red); color: #fff; }

.footer {
  padding: 60px 4% 40px;
  border-top: 1px solid #1a1a1a;
  color: var(--text-muted);
  font-size: 13px;
}

.footer-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 24px;
  margin-bottom: 30px;
}

.footer-col h4 { color: var(--text-secondary); margin-bottom: 12px; font-size: 14px; }
.footer-col a { display: block; color: var(--text-muted); text-decoration: none; margin-bottom: 8px; transition: color 0.2s; }
.footer-col a:hover { color: var(--text-primary); }
.footer-bottom { text-align: center; color: #333; font-size: 12px; }

.loading-screen {
  position: fixed;
  inset: 0;
  z-index: 9999;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: opacity 0.5s;
}

.loading-screen.hidden { opacity: 0; pointer-events: none; }

.loading-logo {
  font-size: 48px;
  font-weight: 900;
  color: var(--red);
  animation: pulse 1.2s ease infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.95); }
}

@media (max-width: 768px) {
  .nav-links { display: none; }
  .hero { height: 70vh; min-height: 450px; }
  .hero-title { font-size: 28px; }
  .hero-desc { font-size: 14px; -webkit-line-clamp: 2; }
  .card { width: 140px; }
  .row-top10 .card { width: 120px; }
  .btn { padding: 10px 20px; font-size: 14px; }
  .player-wrapper { width: 100vw; height: 100vh; border-radius: 0; }
  .search-container.open .search-input { width: 160px; }
}

@media (max-width: 480px) {
  .header { padding: 0 3%; height: 56px; }
  .logo { font-size: 22px; }
  .card { width: 120px; }
  .hero-content { max-width: 100%; }
  .hero-buttons { flex-direction: column; }
  .btn { width: 100%; justify-content: center; }
}
</style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
  <div class="loading-logo">STREAMDEOUF</div>
</div>

<header class="header" id="header">
  <div class="header-left">
    <div class="logo" onclick="showHome()">STREAMDEOUF</div>
    <ul class="nav-links" id="navLinks">
      <li><a href="#" class="active" data-nav="accueil" onclick="showHome(); return false;">Accueil</a></li>
      <li><a href="#" data-nav="films" onclick="filterType('film'); return false;">Films</a></li>
      <li><a href="#" data-nav="series" onclick="filterType('serie'); return false;">Séries</a></li>
      <li><a href="#" data-nav="maliste" onclick="showMyList(); return false;">Ma Liste</a></li>
    </ul>
  </div>
  <div class="header-right">
    <div class="search-container" id="searchContainer">
      <button class="search-toggle" onclick="toggleSearch()">🔍</button>
      <input type="text" class="search-input" id="searchInput" placeholder="Titres, genres..." oninput="handleSearch(this.value)">
    </div>
    <div class="profile-icon">Y</div>
  </div>
</header>

<div class="search-results" id="searchResults">
  <h2 class="search-results-title" id="searchResultsTitle"></h2>
  <div class="search-grid" id="searchGrid"></div>
</div>

<section class="hero" id="hero">
  <div class="hero-bg" id="heroBg"></div>
  <div class="hero-overlay"></div>
  <div class="hero-bottom"></div>
  <div class="hero-content" id="heroContent"></div>
</section>

<div class="genre-bar" id="genreBar"></div>
<div class="content-section" id="contentSection"></div>

<footer class="footer">
  <div class="footer-grid">
    <div class="footer-col">
      <h4>Navigation</h4>
      <a href="#" onclick="showHome(); return false;">Accueil</a>
      <a href="#" onclick="filterType('film'); return false;">Films</a>
      <a href="#" onclick="filterType('serie'); return false;">Séries</a>
      <a href="#" onclick="showMyList(); return false;">Ma Liste</a>
    </div>
    <div class="footer-col">
      <h4>Genres</h4>
      <a href="#" onclick="filterGenre('Action'); return false;">Action</a>
      <a href="#" onclick="filterGenre('Horreur'); return false;">Horreur</a>
      <a href="#" onclick="filterGenre('Comédie'); return false;">Comédie</a>
      <a href="#" onclick="filterGenre('Sci-Fi'); return false;">Science-Fiction</a>
    </div>
    <div class="footer-col">
      <h4>Infos</h4>
      <a href="#">FAQ</a>
      <a href="#">Contact</a>
      <a href="#">Mentions légales</a>
    </div>
    <div class="footer-col">
      <h4>Suivez-nous</h4>
      <a href="#">Telegram</a>
      <a href="#">Discord</a>
      <a href="#">Twitter</a>
    </div>
  </div>
  <div class="footer-bottom">STREAMDEOUF © 2026 — Tous droits réservés (ou pas)</div>
</footer>

<div class="player-modal" id="playerModal">
  <div class="player-wrapper">
    <button class="player-close" onclick="closePlayer()">✕</button>
    <iframe class="player-iframe" id="playerIframe" allowfullscreen allow="autoplay; encrypted-media"></iframe>
    <div class="player-sources" id="playerSources"></div>
  </div>
</div>
