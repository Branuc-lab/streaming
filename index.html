<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STREAMDEOUF</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#fff;font-family:'Segoe UI',Arial,sans-serif;overflow-x:hidden}
::-webkit-scrollbar{height:8px;width:8px}
::-webkit-scrollbar-track{background:#141414}
::-webkit-scrollbar-thumb{background:#e50914;border-radius:4px}

/* HEADER */
.header{position:fixed;top:0;left:0;right:0;z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:12px 40px;background:linear-gradient(180deg,rgba(0,0,0,.95) 0%,transparent 100%);transition:background .3s}
.header.scrolled{background:rgba(0,0,0,.97)}
.logo{font-size:28px;font-weight:900;color:#e50914;letter-spacing:2px;cursor:pointer}
.header-right{display:flex;align-items:center;gap:16px}
.search-box{position:relative}
.search-box input{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:#fff;padding:8px 14px 8px 36px;border-radius:4px;width:0;transition:width .4s;font-size:14px}
.search-box input:focus,.search-box input.open{width:260px;background:rgba(0,0,0,.85);border-color:#e50914}
.search-box svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:16px;height:16px;fill:#999;cursor:pointer;z-index:2}
.lang-btn,.platform-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);color:#fff;padding:7px 14px;border-radius:4px;cursor:pointer;font-size:13px;transition:all .2s}
.lang-btn:hover,.platform-btn:hover{background:#e50914;border-color:#e50914}
.platform-select{background:#1a1a1a;border:1px solid rgba(255,255,255,.2);color:#fff;padding:7px 12px;border-radius:4px;font-size:13px;cursor:pointer}
.platform-select option{background:#1a1a1a}

/* HERO */
.hero{position:relative;height:85vh;min-height:500px;display:flex;align-items:flex-end;padding:0 40px 80px;background-size:cover;background-position:center;transition:background-image .8s}
.hero::after{content:'';position:absolute;inset:0;background:linear-gradient(0deg,#0a0a0a 0%,rgba(10,10,10,.4) 50%,rgba(10,10,10,.7) 100%)}
.hero-content{position:relative;z-index:2;max-width:600px}
.hero-platform{display:inline-block;background:#e50914;padding:3px 10px;border-radius:3px;font-size:11px;font-weight:700;text-transform:uppercase;margin-bottom:12px;letter-spacing:1px}
.hero h1{font-size:52px;font-weight:800;line-height:1.05;margin-bottom:14px;text-shadow:2px 4px 12px rgba(0,0,0,.8)}
.hero p{font-size:16px;color:#ccc;line-height:1.5;margin-bottom:24px;max-width:500px}
.hero-btns{display:flex;gap:12px}
.btn-play{background:#fff;color:#000;border:none;padding:12px 32px;border-radius:4px;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .2s}
.btn-play:hover{background:#e0e0e0}
.btn-info{background:rgba(255,255,255,.15);color:#fff;border:none;padding:12px 28px;border-radius:4px;font-size:16px;font-weight:600;cursor:pointer;transition:background .2s}
.btn-info:hover{background:rgba(255,255,255,.25)}

/* ROWS */
.content{position:relative;z-index:3;margin-top:-80px;padding:0 0 60px}
.row{padding:0 40px;margin-bottom:36px}
.row-title{font-size:20px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.row-title .count{font-size:13px;color:#888;font-weight:400}
.cards{display:flex;gap:10px;overflow-x:auto;padding-bottom:10px;scroll-behavior:smooth}
.card{min-width:185px;max-width:185px;border-radius:6px;overflow:hidden;cursor:pointer;transition:transform .25s,box-shadow .25s;position:relative;flex-shrink:0;background:#1a1a1a}
.card:hover{transform:scale(1.08);box-shadow:0 8px 30px rgba(0,0,0,.7);z-index:10}
.card img{width:100%;height:270px;object-fit:cover;display:block}
.card-info{padding:10px}
.card-title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-meta{font-size:11px;color:#888;margin-top:4px;display:flex;gap:8px}
.card-rating{color:#46d369;font-weight:600}
.card-lang{background:rgba(255,255,255,.1);padding:1px 6px;border-radius:3px;font-size:10px}

/* MODAL PLAYER */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:2000;justify-content:center;align-items:center}
.modal-overlay.active{display:flex}
.modal{width:92%;max-width:1100px;background:#181818;border-radius:10px;overflow:hidden;position:relative;box-shadow:0 20px 60px rgba(0,0,0,.9)}
.modal-close{position:absolute;top:14px;right:14px;background:rgba(0,0,0,.6);border:none;color:#fff;width:36px;height:36px;border-radius:50%;font-size:20px;cursor:pointer;z-index:10;transition:background .2s}
.modal-close:hover{background:#e50914}
.modal iframe{width:100%;height:500px;border:none;display:block}
.modal-info{padding:24px}
.modal-title{font-size:26px;font-weight:700;margin-bottom:8px}
.modal-desc{color:#aaa;font-size:14px;line-height:1.6;margin-bottom:14px}
.modal-details{display:flex;gap:16px;font-size:13px;color:#888}
.modal-details span{display:flex;align-items:center;gap:4px}
.server-btns{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.server-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:#fff;padding:8px 16px;border-radius:4px;cursor:pointer;font-size:12px;transition:all .2s}
.server-btn:hover,.server-btn.active{background:#e50914;border-color:#e50914}

/* LOADER */
.loader{display:none;position:fixed;inset:0;background:#0a0a0a;z-index:3000;justify-content:center;align-items:center;flex-direction:column;gap:16px}
.loader.active{display:flex}
.spinner{width:50px;height:50px;border:4px solid #222;border-top-color:#e50914;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-text{color:#888;font-size:14px}

/* FOOTER */
.footer{text-align:center;padding:40px;color:#555;font-size:13px;border-top:1px solid #1a1a1a}

/* RESPONSIVE */
@media(max-width:768px){
.header{padding:10px 16px}
.logo{font-size:20px}
.hero{height:65vh;padding:0 16px 60px}
.hero h1{font-size:28px}
.hero p{font-size:13px}
.row{padding:0 16px}
.card{min-width:130px;max-width:130px}
.card img{height:195px}
.modal iframe{height:280px}
.search-box input:focus,.search-box input.open{width:160px}
}
</style>
</head>
<body>

<div class="loader active" id="loader">
<div class="spinner"></div>
<div class="loader-text" id="loaderText">Chargement du catalogue...</div>
</div>

<header class="header" id="header">
<div class="logo" onclick="location.reload()">STREAMDEOUF</div>
<div class="header-right">
<div class="search-box">
<svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zM9.5 14C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
<input type="text" id="searchInput" placeholder="Rechercher..." onkeyup="handleSearch(event)">
</div>
<select class="platform-select" id="platformSelect" onchange="changePlatform()">
<option value="all">🎬 Toutes</option>
<option value="netflix">🔴 Netflix</option>
<option value="disney">🔵 Disney+</option>
<option value="prime">🟡 Prime Video</option>
<option value="hulu">🟢 Hulu</option>
<option value="apple">⚪ Apple TV+</option>
<option value="hbo">🟣 HBO Max</option>
</select>
<button class="lang-btn" id="langBtn" onclick="toggleLang()">🇫🇷 FR</button>
</div>
</header>

<div class="hero" id="hero">
<div class="hero-content" id="heroContent"></div>
</div>

<div class="content" id="content"></div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
<div class="modal" id="modal">
<button class="modal-close" onclick="closePlayer()">✕</button>
<iframe id="playerFrame" allowfullscreen allow="autoplay;encrypted-media"></iframe>
<div class="modal-info" id="modalInfo"></div>
</div>
</div>

<div class="footer" id="footer">STREAMDEOUF © 2026</div>

<script>
const TMDB_KEY = '2a9ab28ef99b9160ae89207e95445b0c';
const TMDB = 'https://api.themoviedb.org/3';
const IMG = 'https://image.tmdb.org/t/p/';
const SERVERS = [
{name:'Serveur 1',url:(id,type)=>`https://vidsrc.icu/embed/${type}/${id}`},
{name:'Serveur 2',url:(id,type)=>`https://vidsrc.cc/v2/embed/${type}/${id}`},
{name:'Serveur 3',url:(id,type)=>`https://vidsrc.xyz/embed/${type}/${id}`},
{name:'Serveur 4',url:(id,type)=>`https://multiembed.mov/?video_id=${id}&tmdb=1`},
];

let lang = 'fr';
let currentPlatform = 'all';
let allData = {};

const platformProviders = {
netflix: 8,
disney: 337,
prime: 9,
hulu: 15,
apple: 350,
hbo: 384
};

const texts = {
fr: {
trending:'Tendances',popular:'Populaires',toprated:'Les mieux notés',upcoming:'À venir',
airingNow:'En ce moment',popularSeries:'Séries populaires',topSeries:'Meilleures séries',
play:'▶ Lecture',info:'ℹ Plus d\'infos',search:'Rechercher...',loading:'Chargement du catalogue...',
server:'Serveur',year:'Année',rating:'Note',all:'Toutes',film:'Film',serie:'Série',
noResult:'Aucun résultat trouvé',langLabel:'🇫🇷 FR',seasons:'saisons'
},
en: {
trending:'Trending',popular:'Popular',toprated:'Top Rated',upcoming:'Upcoming',
airingNow:'Airing Now',popularSeries:'Popular Series',topSeries:'Top Series',
play:'▶ Play',info:'ℹ More Info',search:'Search...',loading:'Loading catalog...',
server:'Server',year:'Year',rating:'Rating',all:'All',film:'Movie',serie:'Series',
noResult:'No results found',langLabel:'🇬🇧 EN',seasons:'seasons'
}
};

function t(key){return texts[lang][key]||key}

async function fetchTMDB(endpoint,params={}){
params.api_key=77f0d9098f28cd262109739d1c578945;
params.language=lang==='fr'?'fr-FR':'en-US';
params.region=lang==='fr'?'FR':'US';
const qs=Object.entries(params).map(([k,v])=>`${k}=${v}`).join('&');
try{
const r=await fetch(`${TMDB}${endpoint}?${qs}`);
if(!r.ok)throw new Error(r.status);
return await r.json();
}catch(e){console.error('TMDB error:',endpoint,e);return{results:[]};}
}

async function fetchPlatformContent(type,providerId,page=1){
return fetchTMDB(`/discover/${type}`,{
with_watch_providers:providerId,
watch_region:lang==='fr'?'FR':'US',
sort_by:'popularity.desc',
page
});
}

async function loadAll(){
document.getElementById('loader').classList.add('active');
document.getElementById('loaderText').textContent=t('loading');

if(currentPlatform==='all'){
const [trending,popular,toprated,upcoming,airingSeries,popSeries,topSeries]=await Promise.all([
fetchTMDB('/trending/all/week'),
fetchTMDB('/movie/popular'),
fetchTMDB('/movie/top_rated'),
fetchTMDB('/movie/upcoming'),
fetchTMDB('/tv/airing_today'),
fetchTMDB('/tv/popular'),
fetchTMDB('/tv/top_rated')
]);
allData={
[t('trending')]:trending.results,
[t('popular')]:popular.results,
[t('toprated')]:toprated.results,
[t('upcoming')]:upcoming.results,
[t('airingNow')]:airingSeries.results,
[t('popularSeries')]:popSeries.results,
[t('topSeries')]:topSeries.results
};
}else{
const pid=platformProviders[currentPlatform];
const [movies1,movies2,series1,series2]=await Promise.all([
fetchPlatformContent('movie',pid,1),
fetchPlatformContent('movie',pid,2),
fetchPlatformContent('tv',pid,1),
fetchPlatformContent('tv',pid,2)
]);
const pName=currentPlatform.charAt(0).toUpperCase()+currentPlatform.slice(1);
allData={
[`${pName} — ${t('popular')} ${t('film')}s`]:[...movies1.results,...movies2.results],
[`${pName} — ${t('toprated')} ${t('film')}s`]:movies1.results.sort((a,b)=>b.vote_average-a.vote_average),
[`${pName} — ${t('popularSeries')}`]:[...series1.results,...series2.results],
[`${pName} — ${t('topSeries')}`]:series1.results.sort((a,b)=>b.vote_average-a.vote_average)
};
}

renderHero();
renderRows();
document.getElementById('loader').classList.remove('active');
}

function renderHero(){
const all=Object.values(allData).flat().filter(m=>m.backdrop_path);
if(!all.length)return;
const pick=all[Math.floor(Math.random()*Math.min(all.length,10))];
const hero=document.getElementById('hero');
hero.style.backgroundImage=`url(${IMG}original${pick.backdrop_path})`;
const title=pick.title||pick.name||'';
const overview=pick.overview||'';
const mediaType=pick.media_type||(pick.first_air_date?'tv':'movie');
const year=(pick.release_date||pick.first_air_date||'').substring(0,4);

document.getElementById('heroContent').innerHTML=`
<div class="hero-platform">${currentPlatform==='all'?'STREAMDEOUF':currentPlatform.toUpperCase()}</div>
<h1>${title}</h1>
<p>${overview.length>200?overview.substring(0,200)+'...':overview}</p>
<div class="hero-btns">
<button class="btn-play" onclick="openPlayer(${pick.id},'${mediaType}')">${t('play')}</button>
<button class="btn-info" onclick="openPlayer(${pick.id},'${mediaType}')">${t('info')}</button>
</div>
`;
}

function renderRows(){
const content=document.getElementById('content');
content.innerHTML='';
for(const[title,items]of Object.entries(allData)){
if(!items||!items.length)continue;
const row=document.createElement('div');
row.className='row';
row.innerHTML=`<div class="row-title">${title}<span class="count">(${items.length})</span></div>`;
const cards=document.createElement('div');
cards.className='cards';
items.forEach(item=>{
if(!item.poster_path)return;
const mediaType=item.media_type||(item.first_air_date?'tv':'movie');
const year=(item.release_date||item.first_air_date||'').substring(0,4);
const rating=item.vote_average?item.vote_average.toFixed(1):'—';
const card=document.createElement('div');
card.className='card';
card.onclick=()=>openPlayer(item.id,mediaType);
card.innerHTML=`
<img src="${IMG}w342${item.poster_path}" alt="${item.title||item.name}" loading="lazy" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 342 513%22><rect fill=%22%231a1a1a%22 width=%22342%22 height=%22513%22/><text x=%2250%%22 y=%2250%%22 fill=%22%23555%22 text-anchor=%22middle%22 font-size=%2216%22>No Image</text></svg>'">
<div class="card-info">
<div class="card-title">${item.title||item.name}</div>
<div class="card-meta">
<span class="card-rating">★ ${rating}</span>
<span>${year}</span>
<span class="card-lang">${mediaType==='tv'?'📺':'🎬'}</span>
</div>
</div>`;
cards.appendChild(card);
});
row.appendChild(cards);
content.appendChild(row);
}
}

async function openPlayer(id,type){
const overlay=document.getElementById('modalOverlay');
overlay.classList.add('active');
document.body.style.overflow='hidden';

const frame=document.getElementById('playerFrame');
frame.src=SERVERS[0].url(id,type);

const details=await fetchTMDB(`/${type}/${id}`);
const title=details.title||details.name||'';
const overview=details.overview||'';
const year=(details.release_date||details.first_air_date||'').substring(0,4);
const rating=details.vote_average?details.vote_average.toFixed(1):'—';
const extra=type==='tv'&&details.number_of_seasons?` — ${details.number_of_seasons} ${t('seasons')}`:'';

let serverHtml=SERVERS.map((s,i)=>
`<button class="server-btn ${i===0?'active':''}" onclick="switchServer(${id},'${type}',${i},this)">${s.name}</button>`
).join('');

// language server variants
serverHtml+=`<button class="server-btn" onclick="switchServerLang(${id},'${type}','fr',this)">🇫🇷 VF</button>`;
serverHtml+=`<button class="server-btn" onclick="switchServerLang(${id},'${type}','en',this)">🇬🇧 VO</button>`;

document.getElementById('modalInfo').innerHTML=`
<div class="modal-title">${title}${extra}</div>
<div class="modal-desc">${overview}</div>
<div class="modal-details">
<span>📅 ${year}</span>
<span>⭐ ${rating}/10</span>
<span>${type==='tv'?'📺 '+t('serie'):'🎬 '+t('film')}</span>
</div>
<div class="server-btns">${serverHtml}</div>`;
}

function switchServer(id,type,index,btn){
document.querySelectorAll('.server-btn').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
document.getElementById('playerFrame').src=SERVERS[index].url(id,type);
}

function switchServerLang(id,type,lng,btn){
document.querySelectorAll('.server-btn').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
// vidsrc with language param
document.getElementById('playerFrame').src=`https://vidsrc.icu/embed/${type}/${id}?lang=${lng}`;
}

function closeModal(e){if(e.target===document.getElementById('modalOverlay'))closePlayer()}
function closePlayer(){
document.getElementById('modalOverlay').classList.remove('active');
document.getElementById('playerFrame').src='';
document.body.style.overflow='';
}

function toggleLang(){
lang=lang==='fr'?'en':'fr';
document.getElementById('langBtn').textContent=t('langLabel');
document.getElementById('searchInput').placeholder=t('search');
loadAll();
}

function changePlatform(){
currentPlatform=document.getElementById('platformSelect').value;
loadAll();
}

async function handleSearch(e){
const q=e.target.value.trim();
if(q.length<2){loadAll();return;}
if(e.key==='Enter'||q.length>=3){
const [movies,series]=await Promise.all([
fetchTMDB('/search/movie',{query:encodeURIComponent(q)}),
fetchTMDB('/search/tv',{query:encodeURIComponent(q)})
]);
allData={};
if(movies.results.length)allData[`🎬 ${t('film')}s`]=movies.results;
if(series.results.length)allData[`📺 ${t('serie')}s`]=series.results;
if(!movies.results.length&&!series.results.length)allData[t('noResult')]=[];
renderRows();
}
}

// search toggle
document.querySelector('.search-box svg').addEventListener('click',()=>{
const input=document.getElementById('searchInput');
input.classList.toggle('open');
if(input.classList.contains('open'))input.focus();
});

// header scroll
window.addEventListener('scroll',()=>{
document.getElementById('header').classList.toggle('scrolled',window.scrollY>50);
});

// keyboard
document.addEventListener('keydown',e=>{
if(e.key==='Escape')closePlayer();
});

// init
loadAll();
</script>
</body>
</html>
