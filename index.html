<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>streamdeouf</title>
    <style>
        :root {
            --netflix-red: #e50914;
            --netflix-black: #141414;
        }
        
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: #141414;
            color: #ffffff;
            font-family: 'Helvetica Neue', 'Arial', sans-serif;
            overflow-x: hidden;
        }

        /* HEADER */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 68px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 100%);
            display: flex;
            align-items: center;
            padding: 0 4%;
            z-index: 1000;
            transition: background 0.4s;
        }
        header.scrolled {
            background: #141414;
        }
        .logo {
            color: var(--netflix-red);
            font-size: 2.1rem;
            font-weight: 900;
            letter-spacing: -3px;
            margin-right: 40px;
        }
        nav a {
            color: #e5e5e5;
            text-decoration: none;
            margin-right: 24px;
            font-size: 15px;
            font-weight: 500;
        }
        nav a:hover, nav a.active {
            color: white;
        }

        /* HERO */
        .hero {
            height: 100vh;
            background: linear-gradient(rgba(20,20,20,0.4), rgba(20,20,20,0.85)), 
                        url('https://picsum.photos/id/1015/1920/1080') center/cover no-repeat;
            display: flex;
            align-items: center;
            padding: 0 4%;
            position: relative;
        }
        .hero-content {
            max-width: 650px;
            z-index: 2;
        }
        .hero-content h1 {
            font-size: 4.2rem;
            font-weight: 900;
            margin-bottom: 16px;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.9);
        }
        .hero-content p {
            font-size: 1.35rem;
            line-height: 1.35;
            margin-bottom: 28px;
            color: #ddd;
        }
        .btn {
            padding: 12px 32px;
            font-size: 1.1rem;
            font-weight: 700;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 12px;
        }
        .btn-play {
            background: white;
            color: black;
        }
        .btn-play:hover {
            background: #c6c6c6;
        }

        /* SECTIONS */
        .section {
            padding: 60px 4% 20px;
            position: relative;
            margin-top: -80px;
        }
        .section h2 {
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 16px;
            padding-left: 4px;
        }
        .row {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 10px 0 40px;
            scroll-behavior: smooth;
        }
        .row::-webkit-scrollbar { display: none; }

        .card {
            min-width: 280px;
            border-radius: 6px;
            overflow: hidden;
            position: relative;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            cursor: pointer;
        }
        .card:hover {
            transform: scale(1.12);
            z-index: 10;
        }
        .card img {
            width: 100%;
            display: block;
            transition: transform 0.6s;
        }
        .card:hover img {
            transform: scale(1.08);
        }

        /* PLAYER MODAL */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.98);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .modal.open { display: flex; }
        .modal-content {
            width: 92%;
            max-width: 1350px;
            height: 82vh;
            background: #000;
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(229,9,20,0.4);
        }
        .close {
            position: absolute;
            top: 25px;
            right: 35px;
            font-size: 50px;
            color: #fff;
            cursor: pointer;
            z-index: 10;
            line-height: 40px;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <header id="header">
        <div class="logo">STREAMDEOUF</div>
        <nav>
            <a href="#" class="active">Accueil</a>
            <a href="#">Films</a>
            <a href="#">Séries</a>
            <a href="#">Nouveautés</a>
            <a href="#">Ma liste</a>
        </nav>
    </header>

    <div class="hero">
        <div class="hero-content">
            <h1>THE BATMAN</h1>
            <p>Dans une ville rongée par le crime, un justicier masqué affronte le mal qui ronge Gotham.</p>
            <button class="btn btn-play" onclick="playVideo('https://www.youtube.com/embed/mqqft2x_Aa4')">▶ LECTURE</button>
        </div>
    </div>

    <div class="section">
        <h2>Populaire sur Streamdeouf</h2>
        <div class="row" id="row1"></div>
    </div>

    <div class="section">
        <h2>Films cultes</h2>
        <div class="row" id="row2"></div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="close" onclick="closeModal()">×</div>
            <iframe id="player" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        const movies = [
            {title:"Oppenheimer", img:"https://picsum.photos/id/1015/520/300", url:"https://www.youtube.com/embed/uYPbbksJxIg"},
            {title:"Dune Part Two", img:"https://picsum.photos/id/201/520/300", url:"https://www.youtube.com/embed/8h8nq7v8z8k"},
            {title:"The Batman", img:"https://picsum.photos/id/870/520/300", url:"https://www.youtube.com/embed/mqqft2x_Aa4"},
            {title:"Interstellar", img:"https://picsum.photos/id/29/520/300", url:"https://www.youtube.com/embed/zSWdZVtXT7E"},
            {title:"Joker", img:"https://picsum.photos/id/30/520/300", url:"https://www.youtube.com/embed/zAGVQLHvwOY"}
        ];

        function createCards(containerId) {
            const container = document.getElementById(containerId);
            movies.forEach(m => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <img src="${m.img}" alt="${m.title}">
                `;
                card.onclick = () => playVideo(m.url);
                container.appendChild(card);
            });
        }

        function playVideo(url) {
            document.getElementById('player').src = url + "?autoplay=1&rel=0";
            document.getElementById('modal').classList.add('open');
        }

        function closeModal() {
            const modal = document.getElementById('modal');
            modal.classList.remove('open');
            setTimeout(() => {
                document.getElementById('player').src = '';
            }, 400);
        }

        // Init
        createCards('row1');
        createCards('row2');

        // Header scroll effect
        window.addEventListener('scroll', () => {
            document.getElementById('header').classList.toggle('scrolled', window.scrollY > 80);
        });

        // Close modal with ESC
        document.addEventListener('keydown', e => {
            if (e.key === "Escape") closeModal();
        });
    </script>
</body>
</html>
