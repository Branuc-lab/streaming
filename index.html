<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>streamdeouf</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#141414; color:#fff; font-family:Arial, sans-serif; }
        header { background:#000; padding:15px 40px; position:fixed; width:100%; z-index:100; display:flex; justify-content:space-between; align-items:center; }
        .logo { color:#e50914; font-size:2.5em; font-weight:bold; }
        .hero { height:100vh; background:linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)), url('https://picsum.photos/id/1015/1920/1080'); background-size:cover; display:flex; align-items:center; padding:0 60px; }
        .hero h1 { font-size:4.5em; margin-bottom:20px; }
        .hero p { font-size:1.5em; max-width:700px; margin-bottom:30px; }
        .btn { background:#e50914; color:white; padding:14px 40px; font-size:1.3em; border:none; border-radius:4px; cursor:pointer; }
        .section { padding:60px 40px 30px; }
        h2 { margin-bottom:20px; font-size:1.8em; }
        .row { display:flex; overflow-x:auto; gap:12px; padding:10px 0; }
        .card { min-width:210px; border-radius:6px; overflow:hidden; transition:0.3s; cursor:pointer; }
        .card:hover { transform:scale(1.1); }
        .card img { width:100%; }
        .player { position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:200; display:none; align-items:center; justify-content:center; }
        iframe { width:90%; height:85%; border:none; }
    </style>
</head>
<body>
    <header>
        <div class="logo">STREAMDEOUF</div>
    </header>

    <div class="hero">
        <div>
            <h1>THE BATMAN</h1>
            <p>Regarde tous les films et séries en streaming gratuit illégal. Zéro pub. Zéro compte.</p>
            <button class="btn" onclick="openPlayer('https://vidsrc.to/embed/movie/414906')">▶ REGARDER MAINTENANT</button>
        </div>
    </div>

    <div class="section">
        <h2>Films à l'affiche</h2>
        <div class="row">
            <div class="card" onclick="openPlayer('https://vidsrc.to/embed/movie/414906')"><img src="https://picsum.photos/id/1015/300/170"><p>Deadpool & Wolverine</p></div>
            <div class="card" onclick="openPlayer('https://vidsrc.to/embed/movie/693134')"><img src="https://picsum.photos/id/201/300/170"><p>Dune: Part Two</p></div>
            <div class="card" onclick="openPlayer('https://vidsrc.to/embed/movie/27205')"><img src="https://picsum.photos/id/301/300/170"><p>Inception</p></div>
        </div>
    </div>

    <div class="player" id="player">
        <iframe id="iframePlayer" allowfullscreen></iframe>
    </div>

    <script>
        function openPlayer(url) {
            document.getElementById('player').style.display = 'flex';
            document.getElementById('iframePlayer').src = url;
        }
        
        // fermer avec echap
        document.addEventListener('keydown', function(e) {
            if (e.key === "Escape") {
                document.getElementById('player').style.display = 'none';
                document.getElementById('iframePlayer').src = '';
            }
        });
    </script>
</body>
</html>
