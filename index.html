<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>streamdeouf</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #141414; color: #fff; font-family: 'Helvetica Neue', Arial, sans-serif; }
        header { background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); padding: 20px 40px; position: fixed; width: 100%; z-index: 100; }
        .logo { color: #e50914; font-size: 2.2em; font-weight: bold; }
        .hero { height: 90vh; background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), url('https://picsum.photos/id/1015/1920/1080'); background-size: cover; display: flex; align-items: center; padding: 0 40px; }
        .hero h1 { font-size: 4em; margin-bottom: 20px; }
        .hero p { font-size: 1.4em; max-width: 600px; margin-bottom: 30px; }
        .btn { background: #e50914; color: white; padding: 12px 30px; border: none; border-radius: 4px; font-size: 1.1em; cursor: pointer; }
        .section { padding: 40px; }
        .row { display: flex; overflow-x: auto; gap: 15px; padding: 10px 0; }
        .card { min-width: 220px; border-radius: 8px; overflow: hidden; transition: transform 0.3s; }
        .card:hover { transform: scale(1.08); }
        .card img { width: 100%; display: block; }
        .card p { padding: 10px; background: #1f1f1f; }
    </style>
</head>
<body>
    <header><div class="logo">STREAMDEOUF</div></header>
    
    <div class="hero">
        <div>
            <h1>THE BATMAN</h1>
            <p>Le justicier sombre est de retour. Regarde gratuitement en streaming illégal.</p>
            <button class="btn" onclick="play()">▶ LIRE MAINTENANT</button>
        </div>
    </div>

    <div class="section">
        <h2>Films populaires</h2>
        <div class="row">
            <div class="card"><img src="https://picsum.photos/id/1015/300/170"><p>Deadpool & Wolverine</p></div>
            <div class="card"><img src="https://picsum.photos/id/201/300/170"><p>Oppenheimer</p></div>
            <div class="card"><img src="https://picsum.photos/id/301/300/170"><p>Dune 2</p></div>
        </div>
    </div>

    <script>
        function play() {
            window.open('https://vidsrc.to/embed/movie/123', '_blank');
        }
    </script>
</body>
</html>
