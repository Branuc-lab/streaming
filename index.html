<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STREAMDEOUF - Films & Séries</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: #0a0a0a;
    color: #e5e5e5;
    font-family: 'Inter', sans-serif;
    overflow-x: hidden;
  }

  /* === HEADER === */
  header {
    position: fixed; top:0; left:0; right:0; z-index:1000;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 40px;
    background: linear-gradient(180deg, rgba(0,0,0,0.95) 0%, transparent 100%);
    transition: background 0.3s;
  }
  header.scrolled { background: rgba(10,10,10,0.98); }

  .logo {
    font-size: 26px; font-weight: 900; letter-spacing: 2px;
    color: #e50914; text-transform: uppercase;
    text-shadow: 0 0 20px rgba(229,9,20,0.4);
  }

  nav { display:flex; gap:24px; align-items:center; }
  nav a {
    color: #b3b3b3; text-decoration:none; font-size:14px; font-weight:600;
    transition: color 0.2s;
  }
  nav a:hover, nav a.active { color:#fff; }

  .search-box {
    display:flex; align-items:center; background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15); border-radius:4px;
    padding:6px 12px; gap:8px;
  }
  .search-box input {
    background:transparent; border:none; outline:none; color:#fff;
    font-size:14px; width:200px;
  }
  .search-box input::placeholder { color:#666; }
  .search-icon { color:#999; font-size:14px; }

  /* === HERO === */
  .hero {
    position:relative; width:100%; height:85vh; overflow:hidden;
    display:flex; align-items:flex-end; padding:0 40px 80px;
  }
  .hero-bg {
    position:absolute; inset:0;
    background-size:cover; background-position:center top;
    filter: brightness(0.45);
    transition: background-image 0.8s ease;
  }
  .hero-gradient {
    position:absolute; inset:0;
    background: linear-gradient(0deg, #0a0a0a 0%, transparent 50%),
                linear-gradient(90deg, rgba(10,10,10,0.9) 0%, transparent 60%);
  }
  .hero-content { position:relative; z-index:2; max-width:600px; }
  .hero-content h1 {
    font-size:48px; font-weight:900; line-height:1.1;
    margin-bottom:16px; text-shadow: 0 2px 20px rgba(0,0,0,0.8);
  }
  .hero-content p {
    font-size:15px; line-height:1.6; color:#ccc;
    margin-bottom:24px; display:-webkit-box;
    -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden;
  }
  .hero-meta { display:flex; gap:12px; align-items:center; margin-bottom:16px; }
  .hero-rating {
    background: #e50914; color:#fff; padding:3px 8px;
    border-radius:3px; font-size:13px; font-weight:700;
  }
  .hero-year { color:#999; font-size:14px; }
  .hero-buttons { display:flex; gap:12px; }
  .btn-play, .btn-info {
    padding:12px 28px; border:none; border-radius:4px;
    font-size:15px; font-weight:700; cursor:pointer;
    display:flex; align-items:center; gap:8px; transition:all 0.2s;
  }
  .btn-play { background:#fff; color:#000; }
  .btn-play:hover { background:#e5e5e5; }
  .btn-info { background:rgba(109,109,110,0.7); color:#fff; }
  .btn-info:hover { background:rgba(109,109,110,0.5); }

  /* === ROWS === */
  .content { padding: 20px 40px 60px; margin-top:-40px; position:relative; z-index:5; }
  .row { margin-bottom:40px; }
  .row-title {
    font-size:20px; font-weight:700; margin-bottom:14px;
    color:#fff; padding-left:2px;
  }
  .row-container {
    display:flex; gap:10px; overflow-x:auto; padding-bottom:10px;
    scrollbar-width:none;
  }
  .row-container::-webkit-scrollbar { display:none; }

  .card {
    flex:0 0 180px; cursor:pointer; position:relative;
    border-radius:4px; overflow:hidden; transition: transform 0.25s, box-shadow 0.25s;
  }
  .card:hover {
    transform: scale(1.08); z-index:10;
    box-shadow: 0 8px 30px rgba(0,0,0,0.7);
  }
  .card img {
    width:100%; height:270px; object-fit:cover; display:block;
  }
  .card-overlay {
    position:absolute; bottom:0; left:0; right:0;
    background: linear-gradient(transparent, rgba(0,0,0,0.95));
    padding:30px 10px 10px; opacity:0; transition:opacity 0.25s;
  }
  .card:hover .card-overlay { opacity:1; }
  .card-title { font-size:12px; font-weight:700; line-height:1.3; }
  .card-rating { font-size:11px; color:#46d369; margin-top:3px; }

  /* === MODAL PLAYER === */
  .modal-overlay {
    display:none; position:fixed; inset:0; z-index:9999;
    background:rgba(0,0,0,0.92); align-items:center; justify-content:center;
  }
  .modal-overlay.active { display:flex; }
  .modal-box {
    width:90vw; max-width:1100px; background:#181818;
    border-radius:8px; overflow:hidden; position:relative;
  }
  .modal-close {
    position:absolute; top:12px; right:16px; z-index:10;
    background:rgba(0,0,0,0.6); border:none; color:#fff;
    width:36px; height:36px; border-radius:50%; font-size:20px;
    cursor:pointer; display:flex; align-items:center; justify-content:center;
  }
  .modal-close:hover { background:rgba(255,255,255,0.2); }
  .modal-player { width:100%; aspect-ratio:16/9; background:#000; }
  .modal-player iframe { width:100%; height:100%; border:none; }
  .modal-info { padding:24px; }
  .modal-info h2 { font-size:24px; font-weight:700; margin-bottom:8px; }
  .modal-info .meta { color:#999; font-size:14px; margin-bottom:12px; }
  .modal-info .meta span { margin-right:16px; }
  .modal-info .meta .score { color:#46d369; font-weight:700; }
  .modal-info p { font-size:14px; line-height:1.6; color:#bbb; }

  /* === LOADING === */
  .loading {
    display:flex; justify-content:center; padding:100px 0;
  }
  .spinner {
    width:40px; height:40px; border:3px solid #333;
    border-top-color:#e50914; border-radius:50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* === RESPONSIVE === */
  @media(max-width:768px) {
    header { padding:10px 16px; }
    .logo { font-size:20px; }
    nav a { font-size:12px; }
    .search-box input { width:120px; }
    .hero { height:60vh; padding:0 16px 50px; }
    .hero-content h1 { font-size:28px; }
    .content { padding:10px 16px 40px; }
    .card { flex:0 0 130px; }
    .card img { height:195px; }
    .row-title { font-size:16px; }
  }
</style>
</head>
<body>

<header id="header">
  <div class="logo">STREAMDEOUF</div>
  <nav>
    <a href="#" class="active" data-tab="all">Accueil</a>
    <a href="#" data-tab="movie">Films</a>
    <a href="#" data-tab="tv">Séries</a>
  </nav>
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Rechercher un titre...">
  </div>
</header>

<section class="hero" id="hero">
  <div class="hero-bg" id="heroBg"></div>
  <div class="hero-gradient"></div>
  <div class="hero-content" id="heroContent"></div>
</section>

<div class="content" id="content">
  <div class="loading"><div class="spinner"></div></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <button class="modal-close" id="modalClose">✕</button>
    <div class="modal-player" id="modalPlayer"></div>
    <div class="modal-info" id="modalInfo"></div>
  </div>
</div>

<script>
const TMDB_KEY = '77f0d9098f28cd262109739d1c578945';
const TMDB = 'https://api.themoviedb.org/3';
const IMG = 'https://image.tmdb.org/t/p/';

let currentTab = 'all';
let searchTimeout;

// --- FETCH HELPERS ---
async function tmdb(endpoint) {
  const r = await fetch(`${TMDB}${endpoint}${endpoint.includes('?')?'&':'?'}api_key=${TMDB_KEY}&language=fr-FR`);
  return r.json();
}

// --- HERO ---
async function loadHero() {
  const data = await tmdb('/trending/all/week');
  const items = data.results.filter(i => i.backdrop_path);
  const pick = items[Math.floor(Math.random() * Math.min(5, items.length))];
  const bg = document.getElementById('heroBg');
  const content = document.getElementById('heroContent');
  bg.style.backgroundImage = `url(${IMG}original${pick.backdrop_path})`;
  const title = pick.title || pick.name;
  const year = (pick.release_date || pick.first_air_date || '').slice(0,4);
  const rating = pick.vote_average ? pick.vote_average.toFixed(1) : '?';
  const type = pick.media_type === 'tv' ? 'tv' : 'movie';
  content.innerHTML = `
    <div class="hero-meta">
      <span class="hero-rating">★ ${rating}</span>
      <span class="hero-year">${year}</span>
    </div>
    <h1>${title}</h1>
    <p>${pick.overview || ''}</p>
    <div class="hero-buttons">
      <button class="btn-play" onclick="openPlayer('${type}',${pick.id},'${title.replace(/'/g,"\\'")}',${pick.vote_average},'${year}','${(pick.overview||'').replace(/'/g,"\\'")}')">▶ Lecture</button>
      <button class="btn-info" onclick="openPlayer('${type}',${pick.id},'${title.replace(/'/g,"\\'")}',${pick.vote_average},'${year}','${(pick.overview||'').replace(/'/g,"\\'")}')">ℹ Plus d'infos</button>
    </div>
  `;
}

// --- ROWS ---
async function loadContent(tab) {
  const el = document.getElementById('content');
  el.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  let rows = [];

  if (tab === 'all') {
    rows = [
      { title: '🔥 Tendances de la semaine', endpoint: '/trending/all/week' },
      { title: '🎬 Films populaires', endpoint: '/movie/popular' },
      { title: '📺 Séries populaires', endpoint: '/tv/popular' },
      { title: '🏆 Films les mieux notés', endpoint: '/movie/top_rated' },
      { title: '⭐ Séries les mieux notées', endpoint: '/tv/top_rated' },
      { title: '🎭 Au cinéma maintenant', endpoint: '/movie/now_playing' },
      { title: '📡 Séries en cours de diffusion', endpoint: '/tv/on_the_air' },
      { title: '💀 Films d\'horreur', endpoint: '/discover/movie?with_genres=27' },
      { title: '😂 Comédies', endpoint: '/discover/movie?with_genres=35' },
      { title: '💥 Action', endpoint: '/discover/movie?with_genres=28' },
      { title: '🧪 Science-Fiction', endpoint: '/discover/movie?with_genres=878' },
      { title: '🔎 Thriller', endpoint: '/discover/movie?with_genres=53' },
    ];
  } else if (tab === 'movie') {
    rows = [
      { title: '🎬 Films populaires', endpoint: '/movie/popular' },
      { title: '🏆 Les mieux notés', endpoint: '/movie/top_rated' },
      { title: '🎭 Au cinéma', endpoint: '/movie/now_playing' },
      { title: '📅 Prochaines sorties', endpoint: '/movie/upcoming' },
      { title: '💥 Action', endpoint: '/discover/movie?with_genres=28' },
      { title: '😂 Comédie', endpoint: '/discover/movie?with_genres=35' },
      { title: '💀 Horreur', endpoint: '/discover/movie?with_genres=27' },
      { title: '💕 Romance', endpoint: '/discover/movie?with_genres=10749' },
      { title: '🧪 Sci-Fi', endpoint: '/discover/movie?with_genres=878' },
      { title: '🎨 Animation', endpoint: '/discover/movie?with_genres=16' },
      { title: '📖 Drame', endpoint: '/discover/movie?with_genres=18' },
    ];
  } else {
    rows = [
      { title: '📺 Séries populaires', endpoint: '/tv/popular' },
      { title: '⭐ Les mieux notées', endpoint: '/tv/top_rated' },
      { title: '📡 En diffusion', endpoint: '/tv/on_the_air' },
      { title: '💥 Action & Aventure', endpoint: '/discover/tv?with_genres=10759' },
      { title: '😂 Comédie', endpoint: '/discover/tv?with_genres=35' },
      { title: '📖 Drame', endpoint: '/discover/tv?with_genres=18' },
      { title: '🔎 Mystère', endpoint: '/discover/tv?with_genres=9648' },
      { title: '🧪 Sci-Fi & Fantasy', endpoint: '/discover/tv?with_genres=10765' },
      { title: '🎨 Animation', endpoint: '/discover/tv?with_genres=16' },
    ];
  }

  let html = '';
  const allData = await Promise.all(rows.map(r => tmdb(r.endpoint)));

  allData.forEach((data, i) => {
    const items = (data.results || []).filter(item => item.poster_path);
    if (!items.length) return;
    html += `<div class="row"><div class="row-title">${rows[i].title}</div><div class="row-container">`;
    items.forEach(item => {
      const title = item.title || item.name;
      const type = item.media_type || (item.first_air_date ? 'tv' : 'movie');
      const year = (item.release_date || item.first_air_date || '').slice(0,4);
      const rating = item.vote_average ? item.vote_average.toFixed(1) : '?';
      const safeTitle = title.replace(/'/g,"\\'").replace(/"/g,'&quot;');
      const safeOverview = (item.overview||'').replace(/'/g,"\\'").replace(/"/g,'&quot;');
      html += `
        <div class="card" onclick="openPlayer('${type}',${item.id},'${safeTitle}',${item.vote_average||0},'${year}','${safeOverview}')">
          <img src="${IMG}w300${item.poster_path}" alt="${title}" loading="lazy">
          <div class="card-overlay">
            <div class="card-title">${title}</div>
            <div class="card-rating">★ ${rating} · ${year}</div>
          </div>
        </div>`;
    });
    html += '</div></div>';
  });

  el.innerHTML = html || '<p style="text-align:center;padding:60px;color:#666;">Aucun résultat.</p>';
}

// --- SEARCH ---
async function doSearch(query) {
  if (!query.trim()) { loadContent(currentTab); return; }
  const el = document.getElementById('content');
  el.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  const data = await tmdb(`/search/multi?query=${encodeURIComponent(query)}`);
  const items = (data.results || []).filter(i => i.poster_path && (i.media_type==='movie'||i.media_type==='tv'));
  let html = `<div class="row"><div class="row-title">Résultats pour "${query}"</div><div class="row-container" style="flex-wrap:wrap;">`;
  items.forEach(item => {
    const title = item.title || item.name;
    const type = item.media_type;
    const year = (item.release_date || item.first_air_date || '').slice(0,4);
    const rating = item.vote_average ? item.vote_average.toFixed(1) : '?';
    const safeTitle = title.replace(/'/g,"\\'").replace(/"/g,'&quot;');
    const safeOverview = (item.overview||'').replace(/'/g,"\\'").replace(/"/g,'&quot;');
    html += `
      <div class="card" onclick="openPlayer('${type}',${item.id},'${safeTitle}',${item.vote_average||0},'${year}','${safeOverview}')">
        <img src="${IMG}w300${item.poster_path}" alt="${title}" loading="lazy">
        <div class="card-overlay">
          <div class="card-title">${title}</div>
          <div class="card-rating">★ ${rating} · ${year}</div>
        </div>
      </div>`;
  });
  html += '</div></div>';
  el.innerHTML = items.length ? html : '<p style="text-align:center;padding:60px;color:#666;">Aucun résultat pour "'+query+'"</p>';
}

// --- PLAYER MODAL ---
function openPlayer(type, id, title, rating, year, overview) {
  const modal = document.getElementById('modal');
  const player = document.getElementById('modalPlayer');
  const info = document.getElementById('modalInfo');

  let src;
  if (type === 'tv') {
    src = `https://vidsrc.xyz/embed/tv/${id}`;
  } else {
    src = `https://vidsrc.xyz/embed/movie/${id}`;
  }

  player.innerHTML = `<iframe src="${src}" allowfullscreen allow="autoplay; encrypted-media" frameborder="0"></iframe>`;
  info.innerHTML = `
    <h2>${title}</h2>
    <div class="meta">
      <span class="score">★ ${rating ? rating.toFixed(1) : '?'}</span>
      <span>${year}</span>
      <span>${type==='tv'?'Série':'Film'}</span>
    </div>
    <p>${overview}</p>
  `;
  modal.classList.add('active');
  document.body.style.overflow = 'hidden';
}

document.getElementById('modalClose').onclick = () => {
  document.getElementById('modal').classList.remove('active');
  document.getElementById('modalPlayer').innerHTML = '';
  document.body.style.overflow = '';
};
document.getElementById('modal').onclick = (e) => {
  if (e.target.id === 'modal') {
    document.getElementById('modalClose').click();
  }
};

// --- TABS ---
document.querySelectorAll('nav a').forEach(a => {
  a.onclick = (e) => {
    e.preventDefault();
    document.querySelectorAll('nav a').forEach(x => x.classList.remove('active'));
    a.classList.add('active');
    currentTab = a.dataset.tab;
    loadContent(currentTab);
  };
});

// --- SEARCH INPUT ---
document.getElementById('searchInput').addEventListener('input', (e) => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => doSearch(e.target.value), 500);
});

// --- HEADER SCROLL ---
window.addEventListener('scroll', () => {
  document.getElementById('header').classList.toggle('scrolled', window.scrollY > 50);
});

// --- INIT ---
loadHero();
loadContent('all');
</script>

</body>
</html>
